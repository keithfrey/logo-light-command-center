<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Logo Light Agent Command Center v0.5</title>
<style>
:root{--bg:#0b0f14;--panel:#121923;--panel2:#17212d;--gold:#f2b632;--text:#f5f7fa;--muted:#9eabb8;--line:#263444;--green:#64c987;--red:#e66b6b}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)}
.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}aside{background:#090d12;border-right:1px solid var(--line);padding:22px;position:sticky;top:0;height:100vh}
.brand{font-weight:700;font-size:18px;margin-bottom:24px}.brand small{display:block;color:var(--muted);font-weight:400;margin-top:4px}
nav{display:grid;gap:8px}nav button{background:transparent;border:0;color:var(--muted);padding:12px;border-radius:8px;text-align:left;cursor:pointer}nav button.active,nav button:hover{background:var(--panel2);color:var(--text)}
.ver{position:absolute;bottom:20px;color:var(--muted);font-size:12px}
main{padding:26px}header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}h1,h2,h3{margin-top:0}.muted{color:var(--muted)}
.panel,.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.card b{display:block;font-size:28px;margin-top:8px}.label,.wave{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}.wave{color:var(--gold)}
.head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.pill{display:inline-block;background:#263444;padding:5px 8px;border-radius:999px;font-size:11px;margin:2px}.caps{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.req{color:var(--muted)}button.action{border:1px solid var(--line);background:var(--panel2);color:var(--text);padding:8px 11px;border-radius:8px;cursor:pointer;margin:4px}.approve{background:#173b27!important;border-color:#2d7a4c!important}.reject{background:#4a2020!important;border-color:#9c3d3d!important}
.warning{background:#3d2715;border:1px solid #80531d;color:#ffe2b0;padding:12px;border-radius:9px;margin:12px 0}
.day{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px}.post{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:14px;margin:10px 0}
.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field,textarea{width:100%;background:#0d141d;color:var(--text);border:1px solid var(--line);border-radius:8px;padding:10px}textarea{min-height:100px}
.check{padding:7px 0;color:var(--muted)}
@media(max-width:900px){.app{grid-template-columns:1fr}aside{position:static;height:auto}.ver{position:static;margin-top:20px}.grid,.cards,.formgrid{grid-template-columns:1fr}}
</style></head>
<body><div class="app"><aside><div class="brand">LOGO LIGHT<small>Agent Command Center</small></div>
<nav>
<button class="active" data-view="overview">Overview</button>
<button data-view="calendar">Social Calendar</button>
<button data-view="connections">Publishing Connections</button>
<button data-view="presence">Listings & Reputation</button>
</nav><div class="ver">Version 0.6<br><span id="updated">Loading update time…</span></div></aside>
<main><header><div><h1 id="title">Executive Overview</h1><div class="muted">Publishing, listings, reputation, and scheduling controls.</div></div><div>Keith Frey</div></header><section id="content"></section></main></div>
<script>
let D;const c=document.getElementById('content'),t=document.getElementById('title');
fetch('data.json').then(r=>r.json()).then(x=>{D=x;render('overview')});
fetch('build-info.json').then(r=>r.json()).then(x=>{document.getElementById('updated').textContent='Updated '+new Date(x.updated_at).toLocaleString()}).catch(()=>{document.getElementById('updated').textContent='Update time unavailable'});
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');render(b.dataset.view)});
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
function render(v){const names={overview:'Executive Overview',calendar:'Social Media Calendar',connections:'Publishing Connections',presence:'Listings, Search & Reputation'};t.textContent=names[v];window[v]()}
function overview(){c.innerHTML=`<div class="cards"><div class="card"><span class="label">Publishing channels</span><b>${D.connections.length}</b></div><div class="card"><span class="label">Wave 1</span><b>${D.connections.filter(x=>x.priority==='Wave 1').length}</b></div><div class="card"><span class="label">Listing channels</span><b>${D.presence.length}</b></div><div class="card"><span class="label">Scheduled content</span><b>${loadSocial().length}</b></div></div><div class="panel"><h2>Connection order</h2><p><b>Wave 1:</b> LinkedIn, Google Business Profile, Facebook, Instagram, YouTube</p><p><b>Wave 2:</b> Pinterest, TikTok</p><p><b>Wave 3:</b> Bing, Yelp, Apple Business Connect</p><p><b>Selective:</b> Reddit, Quora, Threads</p></div>`}
function connections(){c.innerHTML=`<div class="panel"><h2>Publishing Connections</h2><div class="warning">Prototype only. Do not enter passwords, tokens, OAuth secrets, or application passwords here.</div></div><div class="grid">${D.connections.map((x,i)=>`<div class="panel"><div class="head"><div><div class="wave">${esc(x.priority)}</div><h2>${esc(x.platform)}</h2></div><span class="pill">${esc(x.status)}</span></div><p><b>Mode:</b> ${esc(x.mode)}</p><p><b>Owner:</b> ${esc(x.owner)} · <b>Review:</b> ${esc(x.review)}</p><div class="caps">${x.supports.map(y=>`<span class="pill">${esc(y)}</span>`).join('')}</div><b>Requirements</b><ul class="req">${x.requirements.map(y=>`<li>${esc(y)}</li>`).join('')}</ul><p class="muted">${esc(x.notes)}</p><button class="action" onclick="status(${i},'Researching')">Start Setup</button><button class="action approve" onclick="status(${i},'Ready for Credentials')">Requirements Complete</button><button class="action reject" onclick="status(${i},'Blocked')">Blocked</button></div>`).join('')}</div>`}
function status(i,s){D.connections[i].status=s;connections()}
function presence(){c.innerHTML=`<div class="panel"><h2>Listings, Search & Reputation</h2><p>These channels are managed for listing accuracy, indexing, reviews, and reputation—not ordinary social posting.</p></div>${D.presence.map(x=>`<div class="panel"><div class="head"><div><div class="wave">${esc(x.priority)}</div><h2>${esc(x.platform)}</h2></div><span class="pill">${esc(x.status)}</span></div><p><b>Owner:</b> ${esc(x.owner)}</p>${x.tasks.map(y=>`<div class="check"><input type="checkbox"> ${esc(y)}</div>`).join('')}<p class="muted">${esc(x.notes)}</p></div>`).join('')}`}
function loadSocial(){const s=localStorage.getItem('llsocialv05');return s?JSON.parse(s):JSON.parse(JSON.stringify(D.social))}
function saveSocial(x){localStorage.setItem('llsocialv05',JSON.stringify(x))}
function calendar(){const items=loadSocial().sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));const g={};items.forEach(x=>(g[x.date]||(g[x.date]=[])).push(x));c.innerHTML=`<div class="panel"><h2>Social Media Calendar</h2><p>Multiple posts per day and multiple platforms are supported.</p><button class="action approve" onclick="addPost()">Add Post</button></div>`+Object.keys(g).map(d=>`<div class="day"><h2>${new Date(d+'T12:00:00').toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'})}</h2>${g[d].map(post).join('')}</div>`).join('')}
function post(x){return `<div class="post"><div><span class="pill">${esc(x.platform)}</span><span class="pill">${esc(x.status)}</span>${x.approved?'<span class="pill">Approved</span>':''}</div><div class="formgrid"><div><label>Platform</label><input class="field" id="p-${x.id}" value="${esc(x.platform)}"></div><div><label>Account</label><input class="field" id="a-${x.id}" value="${esc(x.account)}"></div><div><label>Date</label><input type="date" class="field" id="d-${x.id}" value="${esc(x.date)}"></div><div><label>Time</label><input type="time" class="field" id="tm-${x.id}" value="${esc(x.time)}"></div><div style="grid-column:1/-1"><label>Title</label><input class="field" id="ti-${x.id}" value="${esc(x.title)}"></div><div style="grid-column:1/-1"><label>Text body</label><textarea id="b-${x.id}">${esc(x.body)}</textarea></div><div><label>Image</label><input class="field" id="im-${x.id}" value="${esc(x.image)}"></div><div><label>Video</label><input class="field" id="v-${x.id}" value="${esc(x.video)}"></div><div style="grid-column:1/-1"><label>Recommended time basis</label><textarea id="tb-${x.id}">${esc(x.time_basis)}</textarea></div></div><button class="action" onclick="save('${x.id}')">Save</button><button class="action approve" onclick="approve('${x.id}')">Approve</button><button class="action" onclick="dup('${x.id}')">Duplicate / Post Again</button><button class="action reject" onclick="del('${x.id}')">Delete</button></div>`}
function read(id,x){x.platform=document.getElementById('p-'+id).value;x.account=document.getElementById('a-'+id).value;x.date=document.getElementById('d-'+id).value;x.time=document.getElementById('tm-'+id).value;x.title=document.getElementById('ti-'+id).value;x.body=document.getElementById('b-'+id).value;x.image=document.getElementById('im-'+id).value;x.video=document.getElementById('v-'+id).value;x.time_basis=document.getElementById('tb-'+id).value}
function save(id){const a=loadSocial(),x=a.find(y=>y.id===id);read(id,x);x.status='Edited';x.approved=false;saveSocial(a);calendar()}
function approve(id){const a=loadSocial(),x=a.find(y=>y.id===id);read(id,x);if(!x.platform||!x.date||!x.time||!x.title||!x.body){alert('Platform, date, time, title, and body are required.');return}x.status='Approved';x.approved=true;saveSocial(a);calendar()}
function dup(id){const a=loadSocial(),x=a.find(y=>y.id===id),n=JSON.parse(JSON.stringify(x));n.id='SOC-'+Date.now();n.time='';n.status='Draft';n.approved=false;a.push(n);saveSocial(a);calendar()}
function del(id){if(confirm('Delete this content item?')){saveSocial(loadSocial().filter(x=>x.id!==id));calendar()}}
function addPost(){const a=loadSocial();a.push({id:'SOC-'+Date.now(),date:new Date().toISOString().slice(0,10),time:'',platform:'LinkedIn',account:'Logo Light',title:'',body:'',image:'',video:'',status:'Draft',approved:false,time_basis:'Pulse recommendation pending Northstar research and Beacon validation.'});saveSocial(a);calendar()}
</script></body></html>
